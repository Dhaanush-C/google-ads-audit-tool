<!DOCTYPE html>
<html>
<head>
  <title>Audit Tool</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      background: #060b12;
      color: white;
      font-family: Arial;
      padding: 40px;
    }

    input, button {
      display: block;
      margin: 10px 0;
      padding: 10px;
      width: 300px;
    }

    button {
      background: #2563eb;
      color: white;
      border: none;
      cursor: pointer;
    }

    .progress {
      width: 300px;
      height: 6px;
      background: #1e293b;
      margin-top: 10px;
      border-radius: 4px;
    }

    .progress-bar {
      height: 100%;
      background: #3b82f6;
      transition: width 0.3s;
      border-radius: 4px;
    }

    .result {
      margin-top: 30px;
      border: 1px solid #1e293b;
      padding: 20px;
      border-radius: 8px;
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel" src="google-ads-audit.jsx"></script>
</body>
</html>
